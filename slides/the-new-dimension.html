<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The New Dimension — Slides</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e14;
      --text: #b3b9c5;
      --bright: #e8eaed;
      --green: #39ff14;
      --amber: #ffb700;
      --dim: #4a5568;
      --font: 'JetBrains Mono', 'SF Mono', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 2px,
        rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 999;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
    }

    .back {
      position: fixed;
      top: 2rem;
      left: 3rem;
      color: var(--dim);
      text-decoration: none;
      font-size: 0.9rem;
      z-index: 1001;
    }

    .back:hover { color: var(--green); }

    .prompt {
      color: var(--green);
      font-size: 1.1rem;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
      margin-bottom: 1rem;
    }

    h1 {
      color: var(--bright);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--dim);
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .lang-options {
      display: flex;
      gap: 1.5rem;
    }

    .lang-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding: 2rem 3rem;
      border: 1px solid var(--dim);
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .lang-btn:hover {
      border-color: var(--green);
      color: var(--bright);
      background: rgba(57, 255, 20, 0.03);
    }

    .lang-label {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--bright);
    }

    .lang-native {
      font-size: 0.9rem;
      color: var(--dim);
    }

    .hint {
      margin-top: 3rem;
      color: var(--dim);
      font-size: 0.85rem;
    }

    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <a href="../index.html" class="back">&larr; back to hub</a>

  <div class="container">
    <p class="prompt">$ ./new-dimension --select-language <span class="cursor"></span></p>
    <h1>The New Dimension</h1>
    <p class="subtitle">select presentation language</p>

    <div class="lang-options">
      <a href="the-new-dimension-en.html" class="lang-btn">
        <span class="lang-label">English</span>
        <span class="lang-native">English</span>
      </a>
      <a href="the-new-dimension-uk.html" class="lang-btn">
        <span class="lang-label">Ukrainian</span>
        <span class="lang-native">Українська</span>
      </a>
    </div>

    <p class="hint">arrow keys or spacebar to navigate &middot; F for fullscreen</p>
  </div>

</body>
</html>
